apiVersion: apps/v1
kind: Deployment
metadata:
  name: board-game
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: boardgame
  template:
    metadata:
      labels:
        app: boardgame
    spec:
      containers:
      - name: kube-container
        # Replace with your actual ECR Image URI
        image: 045973518289.dkr.ecr.us-east-1.amazonaws.com/dev/microsvc
        ports:
        - containerPort: 8080
      imagePullSecrets:
      - name: ecr-registry-helper  # <--- THIS MUST MATCH THE SECRET NAME
